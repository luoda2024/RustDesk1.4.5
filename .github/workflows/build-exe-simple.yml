name: Build Windows EXE Simple

on:
  push:
    branches:
      - luoda-custom
    tags:
      - 'v*'
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  generate-bridge:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install prerequisites
        run: |
          sudo apt-get install ca-certificates -y
          sudo apt-get update -y
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            gcc \
            git \
            g++ \
            libclang-dev \
            libgtk-3-dev \
            llvm-dev \
            nasm \
            ninja-build \
            pkg-config \
            wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: '1.75'
          targets: x86_64-unknown-linux-gnu
          components: 'rustfmt'
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: bridge-ubuntu-22.04

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: 'stable'
          flutter-version: '3.24.5'
          cache: true

      - name: Patch flutter
        shell: bash
        run: |
          FLUTTER_DIR=$(dirname $(dirname $(which flutter)))
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $FLUTTER_DIR
          cd $FLUTTER_DIR
          [[ "3.24.5" == 3.24.5 ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff || echo "Patch apply attempted"

      - name: Install flutter rust bridge deps
        shell: bash
        run: |
          set -e
          cargo install cargo-expand --version 1.0.95 --locked || true
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features 'uuid' --locked
          cd flutter
          sed -i -e 's/extended_text: 14.0.0/extended_text: 13.0.0/g' pubspec.yaml
          flutter pub get

      - name: Run flutter rust bridge
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart
            ./flutter/macos/Runner/bridge_generated.h
            ./flutter/ios/Runner/bridge_generated.h

  build-windows:
    runs-on: windows-2022
    needs: generate-bridge
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: '15.0.6'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/*  C:/hostedtoolcache/windows/flutter/stable-3.24.5-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        shell: bash
        run: |
          flutter doctor -v
          FLUTTER_DIR=$(dirname $(dirname $(which flutter)))
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $FLUTTER_DIR
          cd $FLUTTER_DIR
          [[ "3.24.5" == 3.24.5 ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff || echo "Patch apply attempted"

      - name: Install Rust toolchain for build
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: '1.75'
          targets: x86_64-pc-windows-msvc
          components: 'rustfmt'

      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: 120deac3062162151622ca4860575a33844ba10b
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          $VCPKG_ROOT/vcpkg install --triplet x64-windows-static --x-install-root="$VCPKG_ROOT/installed" --feature-flags=manifests --retry 3 --retry-delay 5
          ls $VCPKG_ROOT/installed/x64-windows-static/

      - name: Get Flutter dependencies
        run: |
          cd flutter
          flutter pub get

      - name: Build librustdesk.dll
        shell: bash
        run: |
          cargo build --release --features flutter,hwcodec

      - name: Build Windows EXE
        shell: bash
        run: |
          cd flutter
          flutter build windows --release

      - name: Copy librustdesk.dll to build output
        shell: bash
        run: |
          cp ./target/release/librustdesk.dll ./flutter/build/windows/x64/runner/Release/

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: luoda-exe
          path: flutter/build/windows/x64/runner/Release/
